<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spendly</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  </head>

  <body>

    <!-- HEADER -->
    <header>
      <div class="header-content">
        <h1>Spendly</h1>
        <p class="tagline">Track your spending smartly</p>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main>

      <!-- SECTION 1: SUMMARY CARDS -->
      <section id="summary">
        <div class="card">
          <p class="card-label">Monthly Budget</p>
          <h2 class="card-value green" id="budgetDisplay">ksh 0.00</h2>
        </div>
        <div class="card">
          <p class="card-label">Total Spent</p>
          <h2 class="card-value red" id="spentDisplay">ksh 0.00</h2>
        </div>
        <div class="card">
          <p class="card-label">Remaining Balance</p>
          <h2 class="card-value" id="remainingDisplay">ksh 0.00</h2>
        </div>
      </section>

      <!-- SECTION 2: FORM -->
      <section id="form-section">
        <!-- CURRENCY SELECTOR -->



        <h3 class="section-title">Set Budget & Add Expense</h3>
        <div class="form-grid">
          <div class="form-group">
            <label for="budgetInput">Monthly Budget (ksh)</label>
            <input
              type="number"
              id="budgetInput"
              placeholder="e.g. 1000"
              min="0"
            />
          </div>
          <div class="form-group">
            <label for="nameInput">Expense Name</label>
            <input
              type="text"
              id="nameInput"
              placeholder="e.g. Groceries"
            />
          </div>
          <div class="form-group">
            <label for="amountInput">Amount (ksh)</label>
            <input
              type="number"
              id="amountInput"
              placeholder="e.g. 50"
              min="0"
            />
          </div>
          <div class="form-group">
            <label for="categoryInput">Category</label>
            <select id="categoryInput">
              <option value="food">Food</option>
              <option value="transport">Transport</option>
              <option value="housing">Housing</option>
              <option value="entertainment">Entertainment</option>
              <option value="health">Health</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>
        <button id="addBtn" onclick="handleAdd()">+ Add Expense</button>
      </section>

      <!-- SECTION 3: EXPENSE LIST -->
      <section id="expense-section">
        <h3 class="section-title">My Expenses</h3>
        <div id="expenseList">
          <p id="emptyMsg">No expenses yet. Add one above!</p>
        </div>
      </section>

      <!-- SECTION 4: CHART -->
      <section id="chart-section">
        <h3 class="section-title">Spending by Category</h3>
        <div id="legend"></div>
        <div class="chart-container">
          <canvas
            id="myChart"
            role="img"
            aria-label="Doughnut chart showing spending by category"
          >
            No chart data yet.
          </canvas>
        </div>
      </section>

    </main>

    <!-- FOOTER -->
    <footer>
      <p>Spendly &copy; 2025 | Built with HTML, CSS & JavaScript</p>
    </footer>

    <!-- JAVASCRIPT -->
    <script src="script.js"></script>

  </body>
</html>
