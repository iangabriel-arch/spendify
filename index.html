<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Spendify - Track your daily expenses and manage your budget in Kenyan Shillings">
  <title>Spendify</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app">

  <h1 class="title">💰 Spendify</h1>

  <div class="card summary">
    <div>
      <span>Budget</span>
      <strong id="budgetDisplay">KSh0.00</strong>
    </div>
    <div>
      <span>Spent</span>
      <strong id="spentDisplay">KSh0.00</strong>
    </div>
    <div>
      <span>Remaining</span>
      <strong id="remainingDisplay">KSh0.00</strong>
    </div>
  </div>

  <div class="card form">
    <h3 class="section-title">Set Budget & Add Expense</h3>
    <input type="number" id="budgetInput" placeholder="Set budget (KSh)">
    <input type="text" id="nameInput" placeholder="Expense name">
    <input type="number" id="amountInput" placeholder="Amount (KSh)">
    <select id="categoryInput">
      <option value="food">Food</option>
      <option value="transport">Transport</option>
      <option value="housing">Housing</option>
      <option value="entertainment">Entertainment</option>
      <option value="health">Health</option>
      <option value="other">Other</option>
    </select>
    <button onclick="handleAdd()">+ Add Expense</button>
  </div>

  <div class="card expenses">
    <h3 class="section-title">My Expenses</h3>
    <div class="search-container">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search expenses...">
    </div>
    <div id="expenseList"></div>
  </div>

  <div class="card">
    <h3 class="section-title">Spending by Category</h3>
    <canvas id="myChart"></canvas>
    <div id="legend"></div>
  </div>

  <div class="card">
    <h3 class="section-title">Daily Advice</h3>
    <p id="adviceText">💬 Loading advice...</p>
  </div>

  <footer>
    <p>Spendify &copy; 2025 | Built with HTML, CSS & JavaScript</p>
  </footer>

</div>

<script src="script.js"></script>
</body>
</html>
